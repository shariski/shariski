# Deploy shariski.com to the VPS.
#
# Pipeline:
#   1. SCP the repo's Dockerfile + public/ into a staging dir at
#      /opt/shariski-staging/ on the VPS.
#   2. SSH in, swap staging into /opt/shariski/ (the build context that
#      the compose file's `build: .` line refers to).
#   3. Run `docker compose up -d --build shariski` from /opt/shariski.
#
# nginx-proxy (in /opt/proxy) detects the recreated container via the
# Docker socket, re-renders its config, and routes shariski.com /
# www.shariski.com to it. TLS is served by nginx-proxy's DEFAULT cert
# (wildcard *.shariski.com Cloudflare Origin Cert) — this workflow does
# no certificate work, and LETSENCRYPT_HOST is intentionally NOT set on
# the container (the domain is fronted by Cloudflare).
#
# Triggers:
#   - push to main
#   - manual dispatch (useful for redeploying after a rollback)
#
# Required repo secrets (same names as the kerf repo so the same VPS
# key can be reused):
#   DEPLOY_HOST    — VPS hostname or IP
#   DEPLOY_USER    — SSH user (the deploy user; must be in the docker
#                    group, and have write access to /opt/shariski)
#   DEPLOY_SSH_KEY — private key (PEM); public half lives in the deploy
#                    user's ~/.ssh/authorized_keys on the VPS
#
# Security note: this workflow does not interpolate any github.event.*
# fields into run scripts. All shell substitutions go through env vars.

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys concurrently. Queue them so a fast-follow push
# does not race with the previous deploy's `docker compose up`.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  # Absolute path on the VPS that holds docker-compose.yml + the build
  # context (Dockerfile + public/). Standardised under /opt.
  STACK_DIR: /opt/shariski
  # Staging dir the build context is uploaded to before the atomic swap.
  STAGING_DIR: /opt/shariski-staging
  # Service name in docker-compose.yml. Must match exactly.
  SERVICE: shariski

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stage Dockerfile + public/ in a sibling dir before touching the
      # live tree. Lets us swap atomically; the running container never
      # sees a half-written file system. `rm: true` wipes any prior
      # staging from a failed run.
      - name: scp build context to VPS staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "Dockerfile,public,default.conf"
          target: ${{ env.STAGING_DIR }}/
          rm: true

      - name: swap and rebuild
        uses: appleboy/ssh-action@v1.2.0
        env:
          STACK_DIR: ${{ env.STACK_DIR }}
          STAGING_DIR: ${{ env.STAGING_DIR }}
          SERVICE: ${{ env.SERVICE }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: STACK_DIR,STAGING_DIR,SERVICE
          script: |
            set -euo pipefail

            cd "$STACK_DIR"

            # Swap the freshly-uploaded build context into place. The old
            # Dockerfile + public/ + default.conf are removed cleanly so
            # stale assets (renamed pages, removed images) don't linger in
            # the next image. docker-compose.yml stays put (not uploaded).
            rm -rf Dockerfile public default.conf
            mv "$STAGING_DIR/Dockerfile" "$STAGING_DIR/public" "$STAGING_DIR/default.conf" ./
            rmdir "$STAGING_DIR" 2>/dev/null || true

            # Rebuild the service's image and recreate its container.
            # nginx-proxy detects the new container via the Docker socket
            # and re-renders its config automatically.
            docker compose up -d --build "$SERVICE"

            # Reclaim disk from old image layers so the VPS doesn't
            # accumulate dangling layers across deploys.
            docker image prune -f
