# Caching policy for the static site (served by nginx:alpine via the Dockerfile).
#
# Code (HTML/JS/CSS) is served "no-cache": the browser may store it but must
# revalidate with the server before each use. With ETag/Last-Modified this is a
# tiny 304 when nothing changed, and a fresh 200 the moment a file is redeployed
# — so updates are picked up immediately and we never need ?v= cache-busting.
#
# Media (images/fonts/pdf/video) rarely changes, so it gets a real one-week cache
# to avoid needless round-trips.

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # always-fresh code: store but revalidate before use
    location ~* \.(?:html|js|mjs|css|json|map)$ {
        add_header Cache-Control "no-cache";
    }

    # long-lived media: keep a week, no revalidation needed
    location ~* \.(?:png|jpe?g|gif|svg|ico|webp|avif|woff2?|ttf|otf|eot|pdf|mp4|webm)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
